<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDOX | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

    <!-- LOGIN BOX -->
    <div id="login-box" class="bg-gray-900 border border-blue-900 p-8 rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500 mb-2">SmartDOX</h1>
            <p class="text-gray-400 text-sm italic">Government Tender Evaluation System</p>
        </div>

        <h2 class="text-xl font-semibold mb-6 text-center text-gray-200">Welcome Back</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-1">Email Address</label>
                <input type="email" id="login-email" class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition" placeholder="name@company.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-1">Password</label>
                <input type="password" id="login-pass" class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-4 transition-all shadow-lg shadow-blue-900/20">
                Sign In
            </button>
        </div>

        <p class="text-center text-gray-500 mt-6 text-sm">
            Don't have an account? 
            <span onclick="toggleAuth()" class="text-blue-400 cursor-pointer hover:underline">Create Account</span>
        </p>
    </div>

    <!-- SIGNUP BOX -->
    <div id="signup-box" class="bg-gray-900 border border-blue-900 p-8 rounded-2xl shadow-2xl w-full max-w-md hidden transform transition-all">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500 mb-2">SmartDOX</h1>
            <p class="text-gray-400 text-sm italic">Join the AI Revolution</p>
        </div>

        <h2 class="text-xl font-semibold mb-6 text-center text-gray-200">Create Account</h2>
        
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-1">Full Name</label>
                    <input type="text" id="name" class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-1">Mobile</label>
                    <input type="text" id="mobile" class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition" placeholder="9876...">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-1">Email Address</label>
                <input type="email" id="email" class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition" placeholder="email@example.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-1">Password</label>
                <input type="password" id="pass" class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition" placeholder="••••••••">
            </div>
            <button onclick="handleSignup()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-4 transition-all shadow-lg shadow-blue-900/20">
                Register Now
            </button>
        </div>

        <p class="text-center text-gray-500 mt-6 text-sm">
            Already have an account? 
            <span onclick="toggleAuth()" class="text-blue-400 cursor-pointer hover:underline">Login here</span>
        </p>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        function toggleAuth() {
            const lBox = document.getElementById('login-box');
            const sBox = document.getElementById('signup-box');
            lBox.classList.toggle('hidden');
            sBox.classList.toggle('hidden');
        }

        async function handleSignup() {
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                mobile: document.getElementById('mobile').value,
                password: document.getElementById('pass').value
            };
            try {
                const res = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                alert(result.message || result.error);
                if(result.message) toggleAuth();
            } catch (e) {
                alert("Backend connection error!");
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password: pass})
                });
                const result = await res.json();
                
                if (result.user_id) {
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('user_name', result.name);
                    window.location.href = "index.html";
                } else {
                    alert(result.error || "Login Failed");
                }
            } catch (e) {
                alert("Backend is not responding. Run main.py!");
            }
        }
    </script>
</body>
</html>
