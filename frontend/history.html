<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDOX | Upload History</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen font-sans">

    <!-- NAVIGATION BAR (Same as index.html) -->
    <nav class="bg-gray-900 border-b border-blue-900 p-4 flex justify-between items-center sticky top-0 z-[100]">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-bold text-blue-500">SmartDOX</h1>
            <span class="text-gray-500 text-sm hidden md:inline">| Government Tender Evaluation</span>
        </div>
        
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-gray-300 hover:text-blue-400 transition">Home</a>
            <a href="history.html" class="bg-blue-900 border border-blue-500 px-4 py-1.5 rounded-lg text-white transition flex items-center gap-2">
                📜 Upload History
            </a>
            <button onclick="logout()" class="bg-red-600/20 text-red-500 border border-red-600 px-3 py-1 rounded-md text-sm hover:bg-red-600 hover:text-white transition">
                Logout
            </button>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container mx-auto p-6 mt-10">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-semibold text-blue-400">Your Upload History</h2>
            <p class="text-gray-500 text-sm italic">Showing all tenders processed by you</p>
        </div>

        <!-- TABLE CONTAINER -->
        <div class="bg-gray-900 rounded-xl border border-blue-950 overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-blue-900/30 text-blue-400 border-b border-blue-900">
                        <th class="p-4 font-bold uppercase text-xs tracking-wider">ID</th>
                        <th class="p-4 font-bold uppercase text-xs tracking-wider">File Name</th>
                        <th class="p-4 font-bold uppercase text-xs tracking-wider">Upload Date & Time</th>
                    </tr>
                </thead>
                <tbody id="history-body" class="divide-y divide-gray-800">
                    <!-- Data yahan load hoga -->
                    <tr>
                        <td colspan="3" class="p-20 text-center">
                            <div class="flex flex-col items-center gap-2">
                                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                                <span class="text-gray-500">Fetching records...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        async function loadHistory() {
            const userId = localStorage.getItem('user_id');
            const tbody = document.getElementById('history-body');

            if (!userId) {
                tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-red-400">User not logged in! Redirection to login...</td></tr>';
                setTimeout(() => window.location.href = "login.html", 2000);
                return;
            }

            try {
                const res = await fetch(`${API_URL}/history/${userId}`);
                const data = await res.json();

                tbody.innerHTML = ""; // Clear loader

                if (data.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="3" class="p-20 text-center">
                                <p class="text-gray-500 text-lg">No history found.</p>
                                <a href="index.html" class="text-blue-500 underline mt-2 inline-block">Upload your first tender now</a>
                            </td>
                        </tr>`;
                    return;
                }

                data.forEach(item => {
                    const date = new Date(item.date).toLocaleString('en-IN', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true
                    });

                    const row = `
                        <tr class="hover:bg-blue-900/10 transition group">
                            <td class="p-4 text-blue-500 font-mono text-sm">#${item.id}</td>
                            <td class="p-4">
                                <div class="flex items-center gap-3">
                                    <span class="text-gray-300 group-hover:text-white transition">${item.filename}</span>
                                </div>
                            </td>
                            <td class="p-4 text-gray-500 group-hover:text-gray-300 transition">${date}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error("Fetch Error:", error);
                tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-red-500 font-bold">⚠️ Backend is not responding. Make sure main.py is running.</td></tr>';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        // Load data on page start
        window.onload = loadHistory;
    </script>
</body>
</html>
